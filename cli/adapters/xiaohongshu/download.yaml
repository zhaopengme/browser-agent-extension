site: xiaohongshu
name: download
description: "下载小红书笔记中的图片和视频"
domain: www.xiaohongshu.com
strategy: cookie
browser: true

args:
  note-id:
    positional: true
    type: string
    required: true
    description: "Note ID (from URL)"
  output:
    type: string
    default: "./xiaohongshu-downloads"
    description: Output directory

columns: [index, type, status, size]

pipeline:
  - navigate: https://www.xiaohongshu.com/explore/${{ args['note-id'] }}
  - evaluate: |
      (() => {
        const noteId = ${{ args['note-id'] | json }};
        const result = {
          noteId: noteId,
          title: '',
          author: '',
          media: []
        };

        const titleEl = document.querySelector('.title, #detail-title, .note-content .title');
        result.title = titleEl?.textContent?.trim() || 'untitled';

        const authorEl = document.querySelector('.username, .author-name, .name');
        result.author = authorEl?.textContent?.trim() || 'unknown';

        const imageSelectors = [
          '.swiper-slide img',
          '.carousel-image img',
          '.note-slider img',
          '.note-image img',
          '.image-wrapper img',
          '#noteContainer .media-container img[src*="xhscdn"]',
          'img[src*="ci.xiaohongshu.com"]'
        ];

        const imageUrls = new Set();
        for (const selector of imageSelectors) {
          document.querySelectorAll(selector).forEach(img => {
            let src = img.src || img.getAttribute('data-src') || '';
            if (src && (src.includes('xhscdn') || src.includes('xiaohongshu'))) {
              src = src.split('?')[0];
              imageUrls.add(src);
            }
          });
        }

        const videoSelectors = ['video source', 'video[src]', '.player video', '.video-player video'];
        for (const selector of videoSelectors) {
          document.querySelectorAll(selector).forEach(v => {
            const src = v.src || v.getAttribute('src') || '';
            if (src) result.media.push({ type: 'video', url: src });
          });
        }

        imageUrls.forEach(url => {
          result.media.push({ type: 'image', url: url });
        });

        return result;
      })()
  - download:
      items: media
      output: ${{ args.output | default('./xiaohongshu-downloads') }}
      subdir: ${{ args['note-id'] }}
      filenamePrefix: ${{ args['note-id'] }}
