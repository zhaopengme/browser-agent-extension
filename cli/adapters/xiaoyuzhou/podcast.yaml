site: xiaoyuzhou
name: podcast
description: View a Xiaoyuzhou podcast profile
domain: www.xiaoyuzhoufm.com
strategy: public
browser: false

args:
  id:
    positional: true
    required: true
    type: str
    description: Podcast ID (from xiaoyuzhoufm.com URL)

pipeline:
  - evaluate: |
      (async () => {
        const id = '${{ args.id }}';
        const resp = await fetch('https://www.xiaoyuzhoufm.com/podcast/' + encodeURIComponent(id), {
          headers: { 'User-Agent': 'Mozilla/5.0 (compatible; opencli)' }
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const html = await resp.text();
        const match = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
        if (!match) throw new Error('Failed to extract __NEXT_DATA__');
        const parsed = JSON.parse(match[1]);
        const p = parsed?.props?.pageProps?.podcast;
        if (!p) throw new Error('Podcast not found');
        const formatDate = (iso) => iso ? iso.slice(0, 10) : '-';
        return [{
          title: p.title,
          author: p.author,
          description: p.brief,
          subscribers: p.subscriptionCount,
          episodes: p.episodeCount,
          updated: formatDate(p.latestEpisodePubDate),
        }];
      })()

columns: [title, author, description, subscribers, episodes, updated]
