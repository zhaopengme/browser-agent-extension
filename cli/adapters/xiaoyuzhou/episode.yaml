site: xiaoyuzhou
name: episode
description: View details of a Xiaoyuzhou podcast episode
domain: www.xiaoyuzhoufm.com
strategy: public
browser: false

args:
  id:
    positional: true
    required: true
    type: str
    description: Episode ID (eid from podcast-episodes output)

pipeline:
  - evaluate: |
      (async () => {
        const id = '${{ args.id }}';
        const resp = await fetch('https://www.xiaoyuzhoufm.com/episode/' + encodeURIComponent(id), {
          headers: { 'User-Agent': 'Mozilla/5.0 (compatible; opencli)' }
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const html = await resp.text();
        const match = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
        if (!match) throw new Error('Failed to extract __NEXT_DATA__');
        const parsed = JSON.parse(match[1]);
        const ep = parsed?.props?.pageProps?.episode;
        if (!ep) throw new Error('Episode not found');
        const formatDuration = (s) => {
          if (!Number.isFinite(s) || s < 0) return '-';
          s = Math.round(s);
          return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
        };
        const formatDate = (iso) => iso ? iso.slice(0, 10) : '-';
        return [{
          title: ep.title,
          podcast: ep.podcast?.title,
          duration: formatDuration(ep.duration),
          plays: ep.playCount,
          comments: ep.commentCount,
          likes: ep.clapCount,
          date: formatDate(ep.pubDate),
        }];
      })()

columns: [title, podcast, duration, plays, comments, likes, date]
