site: bilibili
name: subtitle
description: 获取 Bilibili 视频的字幕
domain: www.bilibili.com
strategy: cookie

args:
  bvid:
    required: true
    positional: true
    description: Video BV ID
  lang:
    description: 字幕语言代码 (如 zh-CN, en-US, ai-zh)，默认取第一个

columns: [index, from, to, content]

pipeline:
  - navigate: https://www.bilibili.com/video/${{ args.bvid }}/

  - evaluate: |
      (async () => {
        const bvid = '${{ args.bvid }}';
        const lang = '${{ args.lang }}';

        // --- WBI helpers ---
        const MIXIN_KEY_ENC_TAB = [
          46,47,18,2,53,8,23,32,15,50,10,31,58,3,45,35,27,43,5,49,
          33,9,42,19,29,28,14,39,12,38,41,13,37,48,7,16,24,55,40,
          61,26,17,0,1,60,51,30,4,22,25,54,21,56,59,6,63,57,62,11,
          36,20,34,44,52
        ];

        function getMixinKey(imgKey, subKey) {
          const raw = imgKey + subKey;
          return MIXIN_KEY_ENC_TAB.map(i => raw[i] || '').join('').slice(0, 32);
        }

        function md5(string) {
          function rotateLeft(val, shift) { return (val << shift) | (val >>> (32 - shift)); }
          function addUnsigned(x, y) { return ((x & 0x7FFFFFFF) + (y & 0x7FFFFFFF)) ^ (x & 0x80000000) ^ (y & 0x80000000); }
          function F(x,y,z){return(x&y)|((~x)&z);}function G(x,y,z){return(x&z)|(y&(~z));}function H(x,y,z){return x^y^z;}function I(x,y,z){return y^(x|(~z));}
          function FF(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(F(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b);}
          function GG(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(G(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b);}
          function HH(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(H(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b);}
          function II(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(I(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b);}
          function convertToWordArray(str){const l=str.length;const n=((l+8)>>>6)+1;const a=new Array(n*16).fill(0);for(let i=0;i<l;i++){a[i>>>2]|=str.charCodeAt(i)<<((i%4)*8);}a[l>>>2]|=0x80<<((l%4)*8);a[n*16-2]=l*8;return a;}
          function wordToHex(val){let s='';for(let i=0;i<=3;i++){s+=('0'+((val>>>(i*8))&255).toString(16)).slice(-2);}return s;}
          const x=convertToWordArray(string);let a=0x67452301,b=0xEFCDAB89,c=0x98BADCFE,d=0x10325476;
          for(let k=0;k<x.length;k+=16){const AA=a,BB=b,CC=c,DD=d;
          a=FF(a,b,c,d,x[k],7,0xD76AA478);d=FF(d,a,b,c,x[k+1],12,0xE8C7B756);c=FF(c,d,a,b,x[k+2],17,0x242070DB);b=FF(b,c,d,a,x[k+3],22,0xC1BDCEEE);
          a=FF(a,b,c,d,x[k+4],7,0xF57C0FAF);d=FF(d,a,b,c,x[k+5],12,0x4787C62A);c=FF(c,d,a,b,x[k+6],17,0xA8304613);b=FF(b,c,d,a,x[k+7],22,0xFD469501);
          a=FF(a,b,c,d,x[k+8],7,0x698098D8);d=FF(d,a,b,c,x[k+9],12,0x8B44F7AF);c=FF(c,d,a,b,x[k+10],17,0xFFFF5BB1);b=FF(b,c,d,a,x[k+11],22,0x895CD7BE);
          a=FF(a,b,c,d,x[k+12],7,0x6B901122);d=FF(d,a,b,c,x[k+13],12,0xFD987193);c=FF(c,d,a,b,x[k+14],17,0xA679438E);b=FF(b,c,d,a,x[k+15],22,0x49B40821);
          a=GG(a,b,c,d,x[k+1],5,0xF61E2562);d=GG(d,a,b,c,x[k+6],9,0xC040B340);c=GG(c,d,a,b,x[k+11],14,0x265E5A51);b=GG(b,c,d,a,x[k],20,0xE9B6C7AA);
          a=GG(a,b,c,d,x[k+5],5,0xD62F105D);d=GG(d,a,b,c,x[k+10],9,0x02441453);c=GG(c,d,a,b,x[k+15],14,0xD8A1E681);b=GG(b,c,d,a,x[k+4],20,0xE7D3FBC8);
          a=GG(a,b,c,d,x[k+9],5,0x21E1CDE6);d=GG(d,a,b,c,x[k+14],9,0xC33707D6);c=GG(c,d,a,b,x[k+3],14,0xF4D50D87);b=GG(b,c,d,a,x[k+8],20,0x455A14ED);
          a=GG(a,b,c,d,x[k+13],5,0xA9E3E905);d=GG(d,a,b,c,x[k+2],9,0xFCEFA3F8);c=GG(c,d,a,b,x[k+7],14,0x676F02D9);b=GG(b,c,d,a,x[k+12],20,0x8D2A4C8A);
          a=HH(a,b,c,d,x[k+5],4,0xFFFA3942);d=HH(d,a,b,c,x[k+8],11,0x8771F681);c=HH(c,d,a,b,x[k+11],16,0x6D9D6122);b=HH(b,c,d,a,x[k+14],23,0xFDE5380C);
          a=HH(a,b,c,d,x[k],4,0xA4BEEA44);d=HH(d,a,b,c,x[k+3],11,0x4BDECFA9);c=HH(c,d,a,b,x[k+6],16,0xF6BB4B60);b=HH(b,c,d,a,x[k+9],23,0xBEBFBC70);
          a=HH(a,b,c,d,x[k+12],4,0x289B7EC6);d=HH(d,a,b,c,x[k+15],11,0xEAA127FA);c=HH(c,d,a,b,x[k+2],16,0xD4EF3085);b=HH(b,c,d,a,x[k+5],23,0x04881D05);
          a=HH(a,b,c,d,x[k+8],4,0xD9D4D039);d=HH(d,a,b,c,x[k+11],11,0xE6DB99E5);c=HH(c,d,a,b,x[k+14],16,0x1FA27CF8);b=HH(b,c,d,a,x[k+1],23,0xC4AC5665);
          a=II(a,b,c,d,x[k],6,0xF4292244);d=II(d,a,b,c,x[k+7],10,0x432AFF97);c=II(c,d,a,b,x[k+14],15,0xAB9423A7);b=II(b,c,d,a,x[k+5],21,0xFC93A039);
          a=II(a,b,c,d,x[k+12],6,0x655B59C3);d=II(d,a,b,c,x[k+3],10,0x8F0CCC92);c=II(c,d,a,b,x[k+10],15,0xFFEFF47D);b=II(b,c,d,a,x[k+1],21,0x85845DD1);
          a=II(a,b,c,d,x[k+8],6,0x6FA87E4F);d=II(d,a,b,c,x[k+15],10,0xFE2CE6E0);c=II(c,d,a,b,x[k+6],15,0xA3014314);b=II(b,c,d,a,x[k+13],21,0x4E0811A1);
          a=II(a,b,c,d,x[k+4],6,0xF7537E82);d=II(d,a,b,c,x[k+11],10,0xBD3AF235);c=II(c,d,a,b,x[k+2],15,0x2AD7D2BB);b=II(b,c,d,a,x[k+9],21,0xEB86D391);
          a=addUnsigned(a,AA);b=addUnsigned(b,BB);c=addUnsigned(c,CC);d=addUnsigned(d,DD);}
          return wordToHex(a)+wordToHex(b)+wordToHex(c)+wordToHex(d);
        }

        async function wbiSign(params) {
          const navRes = await fetch('https://api.bilibili.com/x/web-interface/nav', { credentials: 'include' });
          const nav = await navRes.json();
          const wbiImg = nav?.data?.wbi_img || {};
          const imgUrl = wbiImg.img_url || '';
          const subUrl = wbiImg.sub_url || '';
          const imgKey = imgUrl.split('/').pop()?.split('.')[0] || '';
          const subKey = subUrl.split('/').pop()?.split('.')[0] || '';
          const mixinKey = getMixinKey(imgKey, subKey);
          const wts = Math.floor(Date.now() / 1000);
          const allParams = { ...params, wts: String(wts) };
          const sorted = {};
          for (const key of Object.keys(allParams).sort()) {
            sorted[key] = String(allParams[key]).replace(/[!'()*]/g, '');
          }
          const query = new URLSearchParams(sorted).toString().replace(/\+/g, '%20');
          sorted.w_rid = md5(query + mixinKey);
          return sorted;
        }

        async function apiGet(path, params, signed) {
          let finalParams = params;
          if (signed) {
            finalParams = await wbiSign(params);
          }
          const qs = new URLSearchParams(
            Object.fromEntries(Object.entries(finalParams).map(([k, v]) => [k, String(v)]))
          ).toString().replace(/\+/g, '%20');
          const url = 'https://api.bilibili.com' + path + '?' + qs;
          const res = await fetch(url, { credentials: 'include' });
          return await res.json();
        }
        // --- End helpers ---

        // Step 1: Get CID from __INITIAL_STATE__
        const state = window.__INITIAL_STATE__ || {};
        const cid = state?.videoData?.cid;
        if (!cid) {
          throw new Error('无法在页面中提取到当前视频的 CID，请检查页面是否正常加载。');
        }

        // Step 2: Get subtitle list with WBI signing
        const payload = await apiGet('/x/player/wbi/v2', { bvid, cid }, true);

        if (payload.code !== 0) {
          throw new Error('获取视频播放信息失败: ' + payload.message + ' (' + payload.code + ')');
        }

        const subtitles = payload.data?.subtitle?.subtitles || [];
        if (subtitles.length === 0) {
          throw new Error('此视频没有发现外挂或智能字幕。');
        }

        // Step 3: Select target subtitle language
        const target = (lang && lang !== '' && lang !== 'undefined')
          ? (subtitles.find(s => s.lan === lang) || subtitles[0])
          : subtitles[0];

        const targetSubUrl = target.subtitle_url;
        if (!targetSubUrl || targetSubUrl === '') {
          throw new Error('[风控拦截/未登录] 获取到的 subtitle_url 为空！');
        }

        const finalUrl = targetSubUrl.startsWith('//') ? 'https:' + targetSubUrl : targetSubUrl;

        // Step 4: Fetch subtitle JSON from CDN
        const subRes = await fetch(finalUrl);
        const text = await subRes.text();

        if (text.startsWith('<!DOCTYPE') || text.startsWith('<html')) {
          throw new Error('字幕获取失败: HTML response');
        }

        const subJson = JSON.parse(text);
        const body = Array.isArray(subJson?.body) ? subJson.body : (Array.isArray(subJson) ? subJson : []);

        return body.map((item, idx) => ({
          index: idx + 1,
          from: Number(item.from || 0).toFixed(2) + 's',
          to: Number(item.to || 0).toFixed(2) + 's',
          content: item.content
        }));
      })()
