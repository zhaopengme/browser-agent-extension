site: bilibili
name: ranking
description: Get Bilibili video ranking board
domain: www.bilibili.com
strategy: cookie

args:
  limit:
    type: int
    default: 20
    description: Number of results

columns: [rank, title, author, score, url]

pipeline:
  - navigate: https://www.bilibili.com

  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }};

        const res = await fetch('https://api.bilibili.com/x/web-interface/ranking/v2?rid=0&type=all', {
          credentials: 'include'
        });
        const payload = await res.json();
        const results = payload?.data?.list || [];

        return results.slice(0, Number(limit)).map((item, i) => ({
          rank: i + 1,
          title: item.title || '',
          author: item.owner?.name || '',
          score: item.stat?.view || 0,
          url: item.bvid ? 'https://www.bilibili.com/video/' + item.bvid : ''
        }));
      })()
