site: notion
name: sidebar
description: List pages and databases from the Notion sidebar
domain: localhost
strategy: ui
browser: true

columns: [Index, Title]

pipeline:
  - evaluate: |
      (function() {
        const results = [];
        const selectors = ['[class*="sidebar"] [role="treeitem"]', '[class*="sidebar"] a', '.notion-sidebar [role="button"]', 'nav [role="treeitem"]'];
        for (const sel of selectors) {
          const nodes = document.querySelectorAll(sel);
          if (nodes.length > 0) {
            nodes.forEach((n, i) => {
              const text = (n.textContent || '').trim().substring(0, 100);
              if (text && text.length > 1) results.push({ Index: i + 1, Title: text });
            });
            break;
          }
        }
        if (results.length === 0) return [{ Index: 0, Title: 'No sidebar items found. Toggle the sidebar first.' }];
        return results;
      })()
