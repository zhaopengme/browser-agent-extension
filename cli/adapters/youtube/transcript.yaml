site: youtube
name: transcript
description: "Get YouTube video transcript/subtitles"
domain: www.youtube.com
strategy: cookie
browser: true

args:
  url:
    positional: true
    type: string
    required: true
    description: "YouTube video URL or video ID"
  lang:
    type: string
    description: "Language code (e.g. en, zh-Hans). Omit to auto-select"
  mode:
    type: string
    default: grouped
    description: "Output mode: grouped (readable paragraphs) or raw (every segment)"

pipeline:
  - evaluate: |
      (() => {
        const input = ${{ args.url | json }};
        if (!input.startsWith('http')) return input;
        try {
          const parsed = new URL(input);
          if (parsed.searchParams.has('v')) return parsed.searchParams.get('v');
          if (parsed.hostname === 'youtu.be') return parsed.pathname.slice(1).split('/')[0];
          const pathMatch = parsed.pathname.match(/^\/(shorts|embed|live|v)\/([^/?]+)/);
          if (pathMatch) return pathMatch[2];
        } catch {}
        return input;
      })()
  - navigate: https://www.youtube.com/watch?v=${{ data }}
  - wait: 3
  - evaluate: |
      (async () => {
        const videoId = ${{ data | json }};
        const lang = ${{ args.lang | default('') | json }};
        const mode = ${{ args.mode | default('grouped') | json }};
        const cfg = window.ytcfg?.data_ || {};
        const apiKey = cfg.INNERTUBE_API_KEY;
        if (!apiKey) throw new Error('INNERTUBE_API_KEY not found on page');

        // Step 1: Get caption track URL via Android InnerTube API
        const playerResp = await fetch('/youtubei/v1/player?key=' + apiKey + '&prettyPrint=false', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            context: { client: { clientName: 'ANDROID', clientVersion: '20.10.38' } },
            videoId: videoId
          })
        });
        if (!playerResp.ok) throw new Error('InnerTube player API returned HTTP ' + playerResp.status);
        const playerData = await playerResp.json();

        const renderer = playerData.captions?.playerCaptionsTracklistRenderer;
        if (!renderer?.captionTracks?.length) throw new Error('No captions available for this video');

        const tracks = renderer.captionTracks;
        let track = null;
        if (lang) {
          track = tracks.find(t => t.languageCode === lang)
            || tracks.find(t => t.languageCode.startsWith(lang));
        }
        if (!track) track = tracks.find(t => t.kind !== 'asr') || tracks[0];

        // Step 2: Fetch and parse caption XML
        const captionResp = await fetch(track.baseUrl);
        const xml = await captionResp.text();
        if (!xml?.length) throw new Error('Caption URL returned empty response');

        function getAttr(tag, name) {
          const needle = name + '="';
          const idx = tag.indexOf(needle);
          if (idx === -1) return '';
          const valStart = idx + needle.length;
          const valEnd = tag.indexOf('"', valStart);
          return valEnd === -1 ? '' : tag.substring(valStart, valEnd);
        }

        function decodeEntities(s) {
          return s.replaceAll('&amp;', '&').replaceAll('&lt;', '<').replaceAll('&gt;', '>')
            .replaceAll('&quot;', '"').replaceAll('&#39;', "'");
        }

        const isFormat3 = xml.includes('<p t="');
        const marker = isFormat3 ? '<p ' : '<text ';
        const endMarker = isFormat3 ? '</p>' : '</text>';
        const segments = [];
        let pos = 0;

        while (true) {
          const tagStart = xml.indexOf(marker, pos);
          if (tagStart === -1) break;
          let contentStart = xml.indexOf('>', tagStart);
          if (contentStart === -1) break;
          contentStart += 1;
          const tagEnd = xml.indexOf(endMarker, contentStart);
          if (tagEnd === -1) break;

          const attrStr = xml.substring(tagStart + marker.length, contentStart - 1);
          const content = xml.substring(contentStart, tagEnd);

          let startSec, durSec;
          if (isFormat3) {
            startSec = (parseFloat(getAttr(attrStr, 't')) || 0) / 1000;
            durSec = (parseFloat(getAttr(attrStr, 'd')) || 0) / 1000;
          } else {
            startSec = parseFloat(getAttr(attrStr, 'start')) || 0;
            durSec = parseFloat(getAttr(attrStr, 'dur')) || 0;
          }

          const text = decodeEntities(content.replace(/<[^>]+>/g, '')).split('\\n').join(' ').trim();
          if (text) segments.push({ start: startSec, end: startSec + durSec, text });
          pos = tagEnd + endMarker.length;
        }

        if (segments.length === 0) throw new Error('No caption segments found');

        if (mode === 'raw') {
          return segments.map((seg, i) => ({
            timestamp: Number(seg.start).toFixed(2) + 's',
            speaker: '',
            text: seg.text,
          }));
        }

        // Grouped mode: merge by sentences
        const SENTENCE_END = /[.!?\u3002\uFF01\uFF1F\uFF0E]["'\u2019\u201D)]*\s*$/;
        const MAX_SPAN = 30;
        const GAP = 20;
        const groups = [];
        let buffer = '';
        let bufferStart = 0;
        let lastStart = 0;

        function flush() {
          if (buffer.trim()) {
            groups.push({ start: bufferStart, text: buffer.trim() });
            buffer = '';
          }
        }

        for (const seg of segments) {
          if (buffer && seg.start - lastStart > GAP) flush();
          if (buffer && seg.start - bufferStart > MAX_SPAN) flush();
          if (!buffer) bufferStart = seg.start;
          buffer += (buffer ? ' ' : '') + seg.text;
          lastStart = seg.start;
          if (SENTENCE_END.test(seg.text)) flush();
        }
        flush();

        // Format timestamps
        function fmtTime(sec) {
          const h = Math.floor(sec / 3600);
          const m = Math.floor((sec % 3600) / 60);
          const s = Math.floor(sec % 60);
          if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
          return m + ':' + String(s).padStart(2, '0');
        }

        return groups.map(g => ({
          timestamp: fmtTime(g.start),
          speaker: '',
          text: g.text,
        }));
      })()
  - map:
      timestamp: ${{ item.timestamp }}
      speaker: ${{ item.speaker }}
      text: ${{ item.text }}
