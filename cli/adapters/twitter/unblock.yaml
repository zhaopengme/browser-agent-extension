site: twitter
name: unblock
description: Unblock a Twitter user
domain: x.com
strategy: cookie
browser: true

args:
  username:
    type: str
    positional: true
    required: true
    description: Twitter screen name (without @)

columns: [status, message]

pipeline:
  - navigate:
      url: https://x.com/${{ args.username }}
      settleMs: 5000

  - evaluate: |
      (async () => {
        try {
          const username = ${{ args.username | json }}.replace(/^@/, '');
          let attempts = 0;
          let unblockBtn = null;

          while (attempts < 20) {
            const followBtn = document.querySelector('[data-testid$="-follow"]');
            if (followBtn) {
              return [{ status: 'success', message: 'Not blocking @' + username + ' (already unblocked).' }];
            }
            unblockBtn = document.querySelector('[data-testid$="-unblock"]');
            if (unblockBtn) break;
            await new Promise(r => setTimeout(r, 500));
            attempts++;
          }

          if (!unblockBtn) {
            return [{ status: 'failed', message: 'Could not find Unblock button. Are you logged in?' }];
          }

          unblockBtn.click();
          await new Promise(r => setTimeout(r, 1000));

          const confirmBtn = document.querySelector('[data-testid="confirmationSheetConfirm"]');
          if (confirmBtn) {
            confirmBtn.click();
            await new Promise(r => setTimeout(r, 1000));
          }

          const verify = document.querySelector('[data-testid$="-follow"]');
          if (verify) {
            return [{ status: 'success', message: 'Successfully unblocked @' + username + '.' }];
          } else {
            return [{ status: 'failed', message: 'Unblock action initiated but UI did not update.' }];
          }
        } catch (e) {
          return [{ status: 'failed', message: e.toString() }];
        }
      })()
