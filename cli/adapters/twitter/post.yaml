site: twitter
name: post
description: Post a new tweet/thread
domain: x.com
strategy: cookie
browser: true

args:
  text:
    type: str
    required: true
    positional: true
    description: The text content of the tweet

columns: [status, message, text]

pipeline:
  - navigate:
      url: https://x.com/compose/tweet
      settleMs: 3000

  - evaluate: |
      (async () => {
        try {
          const textToInsert = ${{ args.text | json }};
          const box = document.querySelector('[data-testid="tweetTextarea_0"]');
          if (box) {
            box.focus();
            const dataTransfer = new DataTransfer();
            dataTransfer.setData('text/plain', textToInsert);
            box.dispatchEvent(new ClipboardEvent('paste', {
              clipboardData: dataTransfer,
              bubbles: true,
              cancelable: true
            }));
          } else {
            return [{ status: 'failed', message: 'Could not find the tweet composer text area.', text: textToInsert }];
          }

          await new Promise(r => setTimeout(r, 1000));

          const btn = document.querySelector('[data-testid="tweetButton"]');
          if (btn && !btn.disabled) {
            btn.click();
            await new Promise(r => setTimeout(r, 3000));
            return [{ status: 'success', message: 'Tweet posted successfully.', text: textToInsert }];
          } else {
            const inlineBtn = document.querySelector('[data-testid="tweetButtonInline"]');
            if (inlineBtn && !inlineBtn.disabled) {
              inlineBtn.click();
              await new Promise(r => setTimeout(r, 3000));
              return [{ status: 'success', message: 'Tweet posted successfully.', text: textToInsert }];
            }
            return [{ status: 'failed', message: 'Tweet button is disabled or not found.', text: textToInsert }];
          }
        } catch (e) {
          return [{ status: 'failed', message: e.toString(), text: ${{ args.text | json }} }];
        }
      })()
