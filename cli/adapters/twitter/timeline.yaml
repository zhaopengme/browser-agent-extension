site: twitter
name: timeline
description: Fetch Twitter timeline (for-you or following)
domain: x.com
strategy: cookie
browser: true

args:
  type:
    type: str
    default: for-you
    choices: [for-you, following]
    description: "Timeline type: for-you (algorithmic) or following (chronological)"
  limit:
    type: int
    default: 20

columns: [id, author, text, likes, retweets, replies, views, created_at, url]

pipeline:
  - navigate:
      url: https://x.com
      settleMs: 3000

  - evaluate: |
      (async () => {
        const BEARER_TOKEN = 'AAAAAAAAAAAAAAAAAAAAANRILgAAAAAAnNwIzUejRCOuH5E6I8xnZz4puTs%3D1Zv7ttfk8LF81IUq16cHjhLTvJu4FA33AGWWjCpTnA';
        const HOME_TIMELINE_QUERY_ID = 'c-CzHF1LboFilMpsx4ZCrQ';
        const HOME_LATEST_TIMELINE_QUERY_ID = 'BKB7oi212Fi7kQtCBGE4zA';

        const TIMELINE_ENDPOINTS = {
          'for-you': { endpoint: 'HomeTimeline', method: 'GET', fallbackQueryId: HOME_TIMELINE_QUERY_ID },
          'following': { endpoint: 'HomeLatestTimeline', method: 'POST', fallbackQueryId: HOME_LATEST_TIMELINE_QUERY_ID },
        };

        const FEATURES = {
          rweb_video_screen_enabled: false,
          profile_label_improvements_pcf_label_in_post_enabled: true,
          rweb_tipjar_consumption_enabled: true,
          verified_phone_label_enabled: false,
          creator_subscriptions_tweet_preview_api_enabled: true,
          responsive_web_graphql_timeline_navigation_enabled: true,
          responsive_web_graphql_skip_user_profile_image_extensions_enabled: false,
          premium_content_api_read_enabled: false,
          communities_web_enable_tweet_community_results_fetch: true,
          c9s_tweet_anatomy_moderator_badge_enabled: true,
          responsive_web_grok_analyze_button_fetch_trends_enabled: false,
          responsive_web_grok_analyze_post_followups_enabled: true,
          responsive_web_jetfuel_frame: false,
          responsive_web_grok_share_attachment_enabled: true,
          articles_preview_enabled: true,
          responsive_web_edit_tweet_api_enabled: true,
          graphql_is_translatable_rweb_tweet_is_translatable_enabled: true,
          view_counts_everywhere_api_enabled: true,
          longform_notetweets_consumption_enabled: true,
          responsive_web_twitter_article_tweet_consumption_enabled: true,
          tweet_awards_web_tipping_enabled: false,
          responsive_web_grok_show_grok_translated_post: false,
          responsive_web_grok_analysis_button_from_backend: false,
          creator_subscriptions_quote_tweet_preview_enabled: false,
          freedom_of_speech_not_reach_fetch_enabled: true,
          standardized_nudges_misinfo: true,
          tweet_with_visibility_results_prefer_gql_limited_actions_policy_enabled: true,
          longform_notetweets_rich_text_read_enabled: true,
          longform_notetweets_inline_media_enabled: true,
          responsive_web_grok_image_annotation_enabled: true,
          responsive_web_enhance_cards_enabled: false,
        };

        const limit = ${{ args.limit }};
        const timelineType = ${{ args.type | json }} === 'following' ? 'following' : 'for-you';
        const { endpoint, method, fallbackQueryId } = TIMELINE_ENDPOINTS[timelineType];

        const ct0 = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('ct0='))?.split('=')[1] || null;
        if (!ct0) throw new Error('Not logged into x.com (no ct0 cookie)');

        // Dynamically resolve queryId
        let resolved = null;
        try {
          const ghResp = await fetch('https://raw.githubusercontent.com/fa0311/twitter-openapi/refs/heads/main/src/config/placeholder.json');
          if (ghResp.ok) {
            const data = await ghResp.json();
            const entry = data[endpoint];
            if (entry && entry.queryId) resolved = entry.queryId;
          }
        } catch {}
        const queryId = typeof resolved === 'string' && /^[A-Za-z0-9_-]+$/.test(resolved) ? resolved : fallbackQueryId;

        const headers = {
          Authorization: 'Bearer ' + decodeURIComponent(BEARER_TOKEN),
          'X-Csrf-Token': ct0,
          'X-Twitter-Auth-Type': 'OAuth2Session',
          'X-Twitter-Active-User': 'yes',
        };

        function buildTimelineVariables(type, count, cursor) {
          const vars = { count, includePromotedContent: false, latestControlAvailable: true, requestContext: 'launch' };
          if (type === 'for-you') vars.withCommunity = true;
          if (type === 'following') vars.seenTweetIds = [];
          if (cursor) vars.cursor = cursor;
          return vars;
        }

        function buildHomeTimelineUrl(qId, ep, vars) {
          return '/i/api/graphql/' + qId + '/' + ep
            + '?variables=' + encodeURIComponent(JSON.stringify(vars))
            + '&features=' + encodeURIComponent(JSON.stringify(FEATURES));
        }

        function extractTweet(result, seen) {
          if (!result) return null;
          const tw = result.tweet || result;
          const l = tw.legacy || {};
          if (!tw.rest_id || seen.has(tw.rest_id)) return null;
          seen.add(tw.rest_id);
          const u = tw.core?.user_results?.result;
          const screenName = u?.legacy?.screen_name || u?.core?.screen_name || 'unknown';
          const noteText = tw.note_tweet?.note_tweet_results?.result?.text;
          const views = tw.views?.count ? parseInt(tw.views.count, 10) : 0;
          return {
            id: tw.rest_id, author: screenName,
            text: noteText || l.full_text || '',
            likes: l.favorite_count || 0, retweets: l.retweet_count || 0,
            replies: l.reply_count || 0, views,
            created_at: l.created_at || '',
            url: 'https://x.com/' + screenName + '/status/' + tw.rest_id,
          };
        }

        function parseHomeTimeline(data, seen) {
          const tweets = [];
          let nextCursor = null;
          const instructions = data?.data?.home?.home_timeline_urt?.instructions || [];
          for (const inst of instructions) {
            for (const entry of inst.entries || []) {
              const c = entry.content;
              if (c?.entryType === 'TimelineTimelineCursor' || c?.__typename === 'TimelineTimelineCursor') {
                if (c.cursorType === 'Bottom') nextCursor = c.value;
                continue;
              }
              if (entry.entryId?.startsWith('cursor-bottom-')) {
                nextCursor = c?.value || nextCursor;
                continue;
              }
              const tweetResult = c?.itemContent?.tweet_results?.result;
              if (tweetResult) {
                if (c?.itemContent?.promotedMetadata) continue;
                const tw = extractTweet(tweetResult, seen);
                if (tw) tweets.push(tw);
                continue;
              }
              for (const item of c?.items || []) {
                const nested = item.item?.itemContent?.tweet_results?.result;
                if (nested) {
                  if (item.item?.itemContent?.promotedMetadata) continue;
                  const tw = extractTweet(nested, seen);
                  if (tw) tweets.push(tw);
                }
              }
            }
          }
          return { tweets, nextCursor };
        }

        const allTweets = [];
        const seen = new Set();
        let cursor = null;
        for (let i = 0; i < 5 && allTweets.length < limit; i++) {
          const fetchCount = Math.min(40, limit - allTweets.length + 5);
          const variables = buildTimelineVariables(timelineType, fetchCount, cursor);
          const apiUrl = buildHomeTimelineUrl(queryId, endpoint, variables);
          const r = await fetch(apiUrl, { method, headers, credentials: 'include' });
          const data = r.ok ? await r.json() : { error: r.status };
          if (data?.error) {
            if (allTweets.length === 0) throw new Error('HTTP ' + data.error + ': Failed to fetch timeline. queryId may have expired.');
            break;
          }
          const { tweets, nextCursor } = parseHomeTimeline(data, seen);
          allTweets.push(...tweets);
          if (!nextCursor || nextCursor === cursor) break;
          cursor = nextCursor;
        }
        return allTweets.slice(0, limit);
      })()
