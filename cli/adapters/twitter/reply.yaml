site: twitter
name: reply
description: Reply to a specific tweet
domain: x.com
strategy: cookie
browser: true

args:
  url:
    type: str
    required: true
    positional: true
    description: The URL of the tweet to reply to
  text:
    type: str
    required: true
    positional: true
    description: The text content of your reply

columns: [status, message, text]

pipeline:
  - navigate:
      url: ${{ args.url }}
      settleMs: 5000

  - evaluate: |
      (async () => {
        try {
          const replyText = ${{ args.text | json }};
          const box = document.querySelector('[data-testid="tweetTextarea_0"]');
          if (box) {
            box.focus();
            document.execCommand('insertText', false, replyText);
          } else {
            return [{ status: 'failed', message: 'Could not find the reply text area. Are you logged in?', text: replyText }];
          }

          await new Promise(r => setTimeout(r, 1000));

          const btn = document.querySelector('[data-testid="tweetButtonInline"]');
          if (btn && !btn.disabled) {
            btn.click();
            await new Promise(r => setTimeout(r, 3000));
            return [{ status: 'success', message: 'Reply posted successfully.', text: replyText }];
          } else {
            return [{ status: 'failed', message: 'Reply button is disabled or not found.', text: replyText }];
          }
        } catch (e) {
          return [{ status: 'failed', message: e.toString(), text: ${{ args.text | json }} }];
        }
      })()
