site: twitter
name: like
description: Like a specific tweet
domain: x.com
strategy: cookie
browser: true

args:
  url:
    type: str
    required: true
    positional: true
    description: The URL of the tweet to like

columns: [status, message]

pipeline:
  - navigate:
      url: ${{ args.url }}
      settleMs: 5000

  - evaluate: |
      (async () => {
        try {
          let attempts = 0;
          let likeBtn = null;
          let unlikeBtn = null;

          while (attempts < 20) {
            unlikeBtn = document.querySelector('[data-testid="unlike"]');
            likeBtn = document.querySelector('[data-testid="like"]');
            if (unlikeBtn || likeBtn) break;
            await new Promise(r => setTimeout(r, 500));
            attempts++;
          }

          if (unlikeBtn) {
            return [{ status: 'success', message: 'Tweet is already liked.' }];
          }

          if (!likeBtn) {
            return [{ status: 'failed', message: 'Could not find the Like button on this tweet after waiting 10 seconds. Are you logged in?' }];
          }

          likeBtn.click();
          await new Promise(r => setTimeout(r, 1000));

          const verifyBtn = document.querySelector('[data-testid="unlike"]');
          if (verifyBtn) {
            return [{ status: 'success', message: 'Tweet successfully liked.' }];
          } else {
            return [{ status: 'failed', message: 'Like action was initiated but UI did not update as expected.' }];
          }
        } catch (e) {
          return [{ status: 'failed', message: e.toString() }];
        }
      })()
