site: twitter
name: hide-reply
description: Hide a reply on your tweet (useful for hiding bot/spam replies)
domain: x.com
strategy: cookie
browser: true

args:
  url:
    type: str
    required: true
    positional: true
    description: The URL of the reply tweet to hide

columns: [status, message]

pipeline:
  - navigate:
      url: ${{ args.url }}
      settleMs: 5000

  - evaluate: |
      (async () => {
        try {
          let attempts = 0;
          let moreMenu = null;

          while (attempts < 20) {
            moreMenu = document.querySelector('[aria-label="More"]');
            if (moreMenu) break;
            await new Promise(r => setTimeout(r, 500));
            attempts++;
          }

          if (!moreMenu) {
            return [{ status: 'failed', message: 'Could not find the "More" menu on this tweet. Are you logged in?' }];
          }

          moreMenu.click();
          await new Promise(r => setTimeout(r, 1000));

          const items = document.querySelectorAll('[role="menuitem"]');
          let hideItem = null;
          for (const item of items) {
            if (item.textContent && item.textContent.includes('Hide reply')) {
              hideItem = item;
              break;
            }
          }

          if (!hideItem) {
            return [{ status: 'failed', message: 'Could not find "Hide reply" option. This may not be a reply on your tweet.' }];
          }

          hideItem.click();
          await new Promise(r => setTimeout(r, 1500));

          return [{ status: 'success', message: 'Reply successfully hidden.' }];
        } catch (e) {
          return [{ status: 'failed', message: e.toString() }];
        }
      })()
