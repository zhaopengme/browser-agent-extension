site: twitter
name: profile
description: Fetch a Twitter user profile (bio, stats, etc.)
domain: x.com
strategy: cookie
browser: true

args:
  username:
    type: str
    positional: true
    description: "Twitter screen name (without @). Defaults to logged-in user."

columns: [screen_name, name, bio, location, url, followers, following, tweets, likes, verified, created_at]

pipeline:
  - navigate:
      url: https://x.com/home
      settleMs: 5000

  # Step 1: Detect username (from arg or logged-in user)
  - evaluate: |
      (() => {
        let username = (${{ args.username | json }} || '').replace(/^@/, '');
        if (username) return username;
        const link = document.querySelector('a[data-testid="AppTabBar_Profile_Link"]');
        if (!link) throw new Error('Could not detect logged-in user. Are you logged in?');
        return link.getAttribute('href').replace('/', '');
      })()

  # Step 2: Navigate to user profile page (uses data from previous evaluate)
  - navigate:
      url: "https://x.com/${{ data }}"
      settleMs: 3000

  # Step 3: Fetch profile via GraphQL API
  - evaluate: |
      (async () => {
        const screenName = ${{ data | json }};
        const ct0 = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('ct0='))?.split('=')[1];
        if (!ct0) throw new Error('No ct0 cookie - not logged into x.com');

        const bearer = 'AAAAAAAAAAAAAAAAAAAAANRILgAAAAAAnNwIzUejRCOuH5E6I8xnZz4puTs%3D1Zv7ttfk8LF81IUq16cHjhLTvJu4FA33AGWWjCpTnA';
        const headers = {
          'Authorization': 'Bearer ' + decodeURIComponent(bearer),
          'X-Csrf-Token': ct0,
          'X-Twitter-Auth-Type': 'OAuth2Session',
          'X-Twitter-Active-User': 'yes'
        };

        const variables = JSON.stringify({
          screen_name: screenName,
          withSafetyModeUserFields: true,
        });
        const features = JSON.stringify({
          hidden_profile_subscriptions_enabled: true,
          rweb_tipjar_consumption_enabled: true,
          responsive_web_graphql_exclude_directive_enabled: true,
          verified_phone_label_enabled: false,
          subscriptions_verification_info_is_identity_verified_enabled: true,
          subscriptions_verification_info_verified_since_enabled: true,
          highlights_tweets_tab_ui_enabled: true,
          responsive_web_twitter_article_notes_tab_enabled: true,
          subscriptions_feature_can_gift_premium: true,
          creator_subscriptions_tweet_preview_api_enabled: true,
          responsive_web_graphql_skip_user_profile_image_extensions_enabled: false,
          responsive_web_graphql_timeline_navigation_enabled: true,
        });

        async function resolveQueryId(operationName, fallbackId) {
          try {
            const ghResp = await fetch('https://raw.githubusercontent.com/fa0311/twitter-openapi/refs/heads/main/src/config/placeholder.json');
            if (ghResp.ok) {
              const data = await ghResp.json();
              const entry = data[operationName];
              if (entry && entry.queryId) return entry.queryId;
            }
          } catch {}
          try {
            const scripts = performance.getEntriesByType('resource')
              .filter(r => r.name.includes('client-web') && r.name.endsWith('.js'))
              .map(r => r.name);
            for (const scriptUrl of scripts.slice(0, 15)) {
              try {
                const text = await (await fetch(scriptUrl)).text();
                const re = new RegExp('queryId:"([A-Za-z0-9_-]+)"[^}]{0,200}operationName:"' + operationName + '"');
                const m = text.match(re);
                if (m) return m[1];
              } catch {}
            }
          } catch {}
          return fallbackId;
        }

        const queryId = await resolveQueryId('UserByScreenName', 'qRednkZG-rn1P6b48NINmQ');
        const url = '/i/api/graphql/' + queryId + '/UserByScreenName?variables='
          + encodeURIComponent(variables)
          + '&features=' + encodeURIComponent(features);

        const resp = await fetch(url, {headers, credentials: 'include'});
        if (!resp.ok) throw new Error('HTTP ' + resp.status + ': User may not exist or queryId expired');
        const d = await resp.json();

        const result = d.data?.user?.result;
        if (!result) throw new Error('User @' + screenName + ' not found');

        const legacy = result.legacy || {};
        const expandedUrl = legacy.entities?.url?.urls?.[0]?.expanded_url || '';

        return [{
          screen_name: legacy.screen_name || screenName,
          name: legacy.name || '',
          bio: legacy.description || '',
          location: legacy.location || '',
          url: expandedUrl,
          followers: legacy.followers_count || 0,
          following: legacy.friends_count || 0,
          tweets: legacy.statuses_count || 0,
          likes: legacy.favourites_count || 0,
          verified: result.is_blue_verified || legacy.verified || false,
          created_at: legacy.created_at || '',
        }];
      })()
