site: twitter
name: follow
description: Follow a Twitter user
domain: x.com
strategy: cookie
browser: true

args:
  username:
    type: str
    positional: true
    required: true
    description: Twitter screen name (without @)

columns: [status, message]

pipeline:
  - navigate:
      url: https://x.com/${{ args.username }}
      settleMs: 5000

  - evaluate: |
      (async () => {
        try {
          const username = ${{ args.username | json }}.replace(/^@/, '');
          let attempts = 0;
          let followBtn = null;

          while (attempts < 20) {
            const unfollowTestId = document.querySelector('[data-testid$="-unfollow"]');
            if (unfollowTestId) {
              return [{ status: 'success', message: 'Already following @' + username + '.' }];
            }
            followBtn = document.querySelector('[data-testid$="-follow"]');
            if (followBtn) break;
            await new Promise(r => setTimeout(r, 500));
            attempts++;
          }

          if (!followBtn) {
            return [{ status: 'failed', message: 'Could not find Follow button. Are you logged in?' }];
          }

          followBtn.click();
          await new Promise(r => setTimeout(r, 1500));

          const verify = document.querySelector('[data-testid$="-unfollow"]');
          if (verify) {
            return [{ status: 'success', message: 'Successfully followed @' + username + '.' }];
          } else {
            return [{ status: 'failed', message: 'Follow action initiated but UI did not update.' }];
          }
        } catch (e) {
          return [{ status: 'failed', message: e.toString() }];
        }
      })()
