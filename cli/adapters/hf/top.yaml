site: hf
name: top
description: Top upvoted Hugging Face papers
domain: huggingface.co
strategy: public
browser: false

args:
  limit:
    type: int
    default: 20
    description: Number of papers
  all:
    type: bool
    default: false
    description: Return all papers (ignore limit)
  date:
    type: str
    required: false
    description: "Date (YYYY-MM-DD), defaults to most recent"
  period:
    type: str
    default: daily
    choices: [daily, weekly, monthly]
    description: "Time period: daily, weekly, or monthly"

pipeline:
  - evaluate: |
      (async () => {
        const period = String(args.period ?? 'daily');
        const all = Boolean(args.all);
        const limit = Number(args.limit) || 20;
        const endpoint = 'https://huggingface.co';

        function truncate(str, max) {
          max = max || 60;
          return str.length > max ? str.slice(0, max - 3) + '...' : str;
        }
        function formatAuthors(authors, max) {
          max = max || 3;
          const names = (authors || []).map(a => a.name);
          if (names.length <= max) return names.join(', ');
          return names.slice(0, max).join(', ') + ' et al.';
        }

        if (period === 'weekly' || period === 'monthly') {
          if (args.date) throw new Error(`--date is not supported for ${period} period`);
          const url = `${endpoint}/api/papers?period=${period}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HF API error: ${res.status} ${res.statusText}`);
          const data = await res.json();
          if (!Array.isArray(data)) throw new Error('Unexpected HF API response');
          const sorted = [...data].sort((a, b) => (b.upvotes ?? 0) - (a.upvotes ?? 0));
          const items = all ? sorted : sorted.slice(0, limit);
          return items.map((item, i) => ({
            rank: i + 1,
            id: item.id ?? '',
            title: truncate(item.title ?? ''),
            upvotes: item.upvotes ?? 0,
            authors: formatAuthors(item.authors ?? [])
          }));
        }

        // daily
        if (args.date && !/^\d{4}-\d{2}-\d{2}$/.test(String(args.date))) {
          throw new Error(`Invalid date format: ${args.date}. Use YYYY-MM-DD`);
        }
        const url = args.date
          ? `${endpoint}/api/daily_papers?date=${args.date}`
          : `${endpoint}/api/daily_papers`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HF API error: ${res.status} ${res.statusText}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('Unexpected HF API response');
        const sorted = [...data].sort((a, b) => (b.paper?.upvotes ?? 0) - (a.paper?.upvotes ?? 0));
        const items = all ? sorted : sorted.slice(0, limit);
        return items.map((item, i) => ({
          rank: i + 1,
          id: item.paper?.id ?? '',
          title: truncate(item.title ?? ''),
          upvotes: item.paper?.upvotes ?? 0,
          authors: formatAuthors(item.paper?.authors ?? [])
        }));
      })()

columns: [rank, id, title, upvotes, authors]
