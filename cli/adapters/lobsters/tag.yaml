site: lobsters
name: tag
description: Lobste.rs stories by tag
domain: lobste.rs
strategy: public
browser: false

args:
  tag:
    type: str
    required: true
    positional: true
    description: "Tag name (e.g. programming, rust, security, ai)"
  limit:
    type: int
    default: 20
    description: Number of stories

pipeline:
  - fetch:
      url: https://lobste.rs/t/${{ args.tag }}.json

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      score: ${{ item.score }}
      author: ${{ item.submitter_user }}
      comments: ${{ item.comment_count }}
      tags: ${{ item.tags | join(', ') }}
      url: ${{ item.comments_url }}

  - limit: ${{ args.limit }}

columns: [rank, title, score, author, comments, tags]
