site: jike
name: like
description: "点赞即刻帖子"
domain: web.okjike.com
strategy: ui
browser: true

args:
  id:
    positional: true
    type: string
    required: true
    description: "帖子 ID"

columns: [status, message]

pipeline:
  - navigate: https://web.okjike.com/originalPost/${{ args.id }}
  - evaluate: |
      (async () => {
        const likeBtn = document.querySelector('[class*="_likeButton_"]');
        if (!likeBtn) return [{ status: 'failed', message: '未找到点赞按钮' }];

        const cls = likeBtn.className || '';
        if (cls.includes('_liked')) {
          return [{ status: 'success', message: '该帖子已赞过' }];
        }

        const beforeCls = likeBtn.className;
        likeBtn.click();
        await new Promise(r => setTimeout(r, 1500));

        const afterCls = likeBtn.className;
        if (afterCls !== beforeCls) {
          return [{ status: 'success', message: '点赞成功' }];
        }

        return [{ status: 'failed', message: '点赞状态未确认，请手动检查' }];
      })()
  - map:
      status: ${{ item.status }}
      message: ${{ item.message }}
