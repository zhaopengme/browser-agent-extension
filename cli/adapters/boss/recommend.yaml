site: boss
name: recommend
description: "BOSS直聘查看推荐候选人（新招呼列表）"
domain: www.zhipin.com
strategy: cookie
browser: true

args:
  limit:
    type: int
    default: 20
    description: Number of results to return

columns: [name, job_name, last_time, labels, encrypt_uid, security_id, encrypt_job_id]

pipeline:
  - navigate: https://www.zhipin.com/web/chat/index
  - wait: 2
  - evaluate: |
      (async () => {
        const limit = ${{ args.limit }} || 20;
        const url = 'https://www.zhipin.com/wapi/zprelation/friend/greetRecSortList';
        const resp = await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', url, true); xhr.withCredentials = true; xhr.timeout = 15000;
          xhr.setRequestHeader('Accept', 'application/json');
          xhr.onload = () => { try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(e); } };
          xhr.onerror = () => reject(new Error('Network Error'));
          xhr.ontimeout = () => reject(new Error('Timeout'));
          xhr.send(null);
        });
        if (resp.code !== 0) return [{ name: 'Error', job_name: '', last_time: '', labels: resp.message || '', encrypt_uid: '', security_id: '', encrypt_job_id: '' }];
        return (resp.zpData?.friendList || []).slice(0, limit).map(f => ({
          name: f.name || '', job_name: f.jobName || '', last_time: f.lastTime || '',
          labels: (f.relationLabelList || []).join(', '),
          encrypt_uid: f.encryptUid || '', security_id: f.securityId || '', encrypt_job_id: f.encryptJobId || '',
        }));
      })()
