site: boss
name: chatlist
description: "BOSS直聘查看聊天列表（招聘端）"
domain: www.zhipin.com
strategy: cookie
browser: true

args:
  page:
    type: int
    default: 1
    description: Page number
  limit:
    type: int
    default: 20
    description: Number of results
  job-id:
    type: string
    default: "0"
    description: "Filter by job ID (0=all)"

columns: [name, job, last_msg, last_time, uid, security_id]

pipeline:
  - navigate: https://www.zhipin.com/web/chat/index
  - wait: 2
  - evaluate: |
      (async () => {
        const pageNum = ${{ args.page }} || 1;
        const jobId = ${{ args["job-id"] | json }} || '0';
        const limit = ${{ args.limit }} || 20;
        const url = 'https://www.zhipin.com/wapi/zprelation/friend/getBossFriendListV2.json?page=' + pageNum + '&status=0&jobId=' + jobId;
        const resp = await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', url, true);
          xhr.withCredentials = true;
          xhr.timeout = 15000;
          xhr.setRequestHeader('Accept', 'application/json');
          xhr.onload = () => { try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(e); } };
          xhr.onerror = () => reject(new Error('Network Error'));
          xhr.ontimeout = () => reject(new Error('Timeout'));
          xhr.send(null);
        });
        if (resp.code !== 0) return [{ name: 'Error', job: '', last_msg: resp.message || '', last_time: '', uid: '', security_id: '' }];
        const friends = resp.zpData?.friendList || [];
        return friends.slice(0, limit).map(f => ({
          name: f.name || '',
          job: f.jobName || '',
          last_msg: f.lastMessageInfo?.text || '',
          last_time: f.lastTime || '',
          uid: f.encryptUid || '',
          security_id: f.securityId || '',
        }));
      })()
