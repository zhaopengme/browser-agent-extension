site: hackernews
name: search
description: Search Hacker News stories
domain: news.ycombinator.com
strategy: public
browser: false

args:
  query:
    type: str
    required: true
    positional: true
    description: Search query
  limit:
    type: int
    default: 20
    description: Number of results
  sort:
    type: str
    default: relevance
    choices: [relevance, date]
    description: Sort by relevance or date

pipeline:
  - fetch:
      url: "https://hn.algolia.com/api/v1/${{ args.sort == 'date' ? 'search_by_date' : 'search' }}"
      params:
        query: ${{ args.query }}
        tags: story
        hitsPerPage: ${{ args.limit }}

  - select: hits

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      score: ${{ item.points }}
      author: ${{ item.author }}
      comments: ${{ item.num_comments }}
      url: ${{ item.url }}

  - limit: ${{ args.limit }}

columns: [rank, title, score, author, comments]
