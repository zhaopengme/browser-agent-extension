site: antigravity
name: dump
description: Dump the DOM to help AI understand the UI
domain: localhost
strategy: ui
browser: true

columns: [htmlFile, snapFile]

pipeline:
  - evaluate: |
      (function() {
        return [{ htmlFile: '/tmp/antigravity-dom.html', snapFile: '/tmp/antigravity-snapshot.json' }];
      })()
