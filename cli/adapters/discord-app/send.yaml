site: discord-app
name: send
description: Send a message in the active Discord channel
domain: localhost
strategy: ui
browser: true

args:
  text:
    positional: true
    type: string
    required: true
    description: Message to send

columns: [Status]

pipeline:
  - evaluate: |
      (async () => {
        const text = ${{ args.text | json }};
        const editor = document.querySelector('[role="textbox"][data-slate-editor="true"], [class*="slateTextArea"]');
        if (!editor) return [{ Status: 'Error: Could not find Discord message input.' }];
        editor.focus();
        document.execCommand('insertText', false, text);
        await new Promise(r => setTimeout(r, 300));
        editor.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', code: 'Enter', keyCode: 13, bubbles: true }));
        return [{ Status: 'Success' }];
      })()
