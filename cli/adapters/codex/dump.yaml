site: codex
name: dump
description: Dump the DOM and Accessibility tree of Codex for reverse-engineering
domain: localhost
strategy: ui
browser: true

columns: [action, files]

pipeline:
  - evaluate: |
      (function() {
        return [{ action: 'Dom extraction finished', files: '/tmp/codex-dom.html, /tmp/codex-snapshot.json' }];
      })()
