site: codex
name: ask
description: Send a prompt and wait for the AI response (send + wait + read)
domain: localhost
strategy: ui
browser: true

args:
  text:
    positional: true
    type: string
    required: true
    description: Prompt to send
  timeout:
    type: int
    default: 60
    description: "Max seconds to wait for response"

columns: [Role, Text]

pipeline:
  - evaluate: |
      (async () => {
        const text = ${{ args.text | json }};
        const timeout = ${{ args.timeout }} || 60;

        const beforeLen = document.querySelectorAll('[data-content-search-turn-key]').length;

        const editables = Array.from(document.querySelectorAll('[contenteditable="true"]'));
        const composer = editables.length > 0 ? editables[editables.length - 1] : document.querySelector('textarea');
        if (!composer) return [{ Role: 'System', Text: 'Could not find Codex input' }];
        composer.focus();
        document.execCommand('insertText', false, text);
        await new Promise(r => setTimeout(r, 500));
        composer.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', code: 'Enter', keyCode: 13, bubbles: true }));

        const pollInterval = 3;
        const maxPolls = Math.ceil(timeout / pollInterval);
        let response = '';

        for (let i = 0; i < maxPolls; i++) {
          await new Promise(r => setTimeout(r, pollInterval * 1000));
          const turns = document.querySelectorAll('[data-content-search-turn-key]');
          if (turns.length <= beforeLen) continue;
          const lastTurn = turns[turns.length - 1];
          const t = lastTurn.innerText || lastTurn.textContent;
          if (t && t.trim()) { response = t.trim(); break; }
        }

        if (!response) {
          return [
            { Role: 'User', Text: text },
            { Role: 'System', Text: 'No response within ' + timeout + 's. The agent may still be working.' },
          ];
        }

        return [
          { Role: 'User', Text: text },
          { Role: 'Assistant', Text: response },
        ];
      })()
