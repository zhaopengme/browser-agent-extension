site: codex
name: send
description: Send text/commands to the Codex AI composer
domain: localhost
strategy: ui
browser: true

args:
  text:
    positional: true
    type: string
    required: true
    description: "Text, command (e.g. /review), or skill"

columns: [Status, InjectedText]

pipeline:
  - evaluate: |
      (async () => {
        const textToInsert = ${{ args.text | json }};

        const editables = Array.from(document.querySelectorAll('[contenteditable="true"]'));
        let composer = editables.length > 0 ? editables[editables.length - 1] : document.querySelector('textarea');
        if (!composer) return [{ Status: 'Error', InjectedText: 'Could not find Composer input element in Codex UI' }];

        composer.focus();
        document.execCommand('insertText', false, textToInsert);
        await new Promise(r => setTimeout(r, 500));
        composer.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', code: 'Enter', keyCode: 13, bubbles: true }));

        return [{ Status: 'Success', InjectedText: textToInsert }];
      })()
