site: codex
name: status
description: Check active CDP connection to OpenAI Codex App
domain: localhost
strategy: ui
browser: true

columns: [Status, Url, Title]

pipeline:
  - evaluate: |
      (function() {
        return [{
          Status: 'Connected',
          Url: window.location.href,
          Title: document.title,
        }];
      })()
