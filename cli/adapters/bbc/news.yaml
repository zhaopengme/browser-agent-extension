site: bbc
name: news
description: BBC News headlines (RSS)
domain: feeds.bbci.co.uk
strategy: public
browser: false

args:
  limit:
    type: int
    default: 20
    description: Number of headlines (max 50)

pipeline:
  - evaluate: |
      (async () => {
        const count = Math.min(Number(args.limit) || 20, 50);
        const resp = await fetch('https://feeds.bbci.co.uk/news/rss.xml');
        if (!resp.ok) return [];
        const xml = await resp.text();
        const items = [];
        const itemRegex = /<item>([\s\S]*?)<\/item>/g;
        let match;
        while ((match = itemRegex.exec(xml)) && items.length < count) {
          const block = match[1];
          const title = (block.match(/<title><!\[CDATA\[(.*?)\]\]>/) || block.match(/<title>(.*?)<\/title>/) || [])[1] || '';
          const desc = (block.match(/<description><!\[CDATA\[(.*?)\]\]>/) || block.match(/<description>(.*?)<\/description>/) || [])[1] || '';
          const link = (block.match(/<link>(.*?)<\/link>/) || block.match(/<guid[^>]*>(.*?)<\/guid>/) || [])[1] || '';
          if (title) {
            items.push({
              rank: items.length + 1,
              title: title.trim(),
              description: desc.trim().substring(0, 200),
              url: link.trim()
            });
          }
        }
        return items;
      })()

columns: [rank, title, description, url]
