site: wikipedia
name: summary
domain: en.wikipedia.org
description: Get Wikipedia article summary
strategy: public
browser: false

args:
  title:
    type: str
    required: true
    positional: true
    description: 'Article title (e.g. "Transformer (machine learning model)")'
  lang:
    type: str
    default: en
    description: "Language code (e.g. en, zh, ja)"

pipeline:
  - evaluate: |
      (async () => {
        const lang = args.lang || 'en';
        const title = encodeURIComponent(args.title.replace(/ /g, '_'));
        const url = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${title}`;
        const resp = await fetch(url, {
          headers: { 'User-Agent': 'opencli/1.0 (https://github.com/jackwener/opencli)' }
        });
        if (!resp.ok) throw new Error(`Article "${args.title}" not found`);
        const data = await resp.json();
        if (!data?.title) throw new Error(`Article "${args.title}" not found`);
        return [{
          title: data.title,
          description: data.description ?? '-',
          extract: (data.extract ?? '').slice(0, 300),
          url: data.content_urls?.desktop?.page ?? `https://${lang}.wikipedia.org`
        }];
      })()

columns: [title, description, extract, url]
