site: v2ex
name: replies
description: V2EX 主题回复列表
domain: www.v2ex.com
strategy: public
browser: false

args:
  id:
    positional: true
    type: str
    required: true
    description: Topic ID
  limit:
    type: int
    default: 20
    description: Number of replies

pipeline:
  - fetch:
      url: https://www.v2ex.com/api/replies/show.json
      params:
        topic_id: ${{ args.id }}

  - map:
      floor: ${{ index + 1 }}
      author: ${{ item.member.username }}
      content: ${{ item.content }}

  - limit: ${{ args.limit }}

columns: [floor, author, content]
