site: v2ex
name: nodes
description: V2EX 所有节点列表
domain: www.v2ex.com
strategy: public
browser: false

args:
  limit:
    type: int
    default: 30
    description: Number of nodes

pipeline:
  - fetch:
      url: https://www.v2ex.com/api/nodes/all.json

  - sort:
      by: topics
      order: desc

  - map:
      rank: ${{ index + 1 }}
      name: ${{ item.name }}
      title: ${{ item.title }}
      topics: ${{ item.topics }}
      stars: ${{ item.stars }}

  - limit: ${{ args.limit }}

columns: [rank, name, title, topics, stars]
