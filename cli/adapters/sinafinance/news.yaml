site: sinafinance
name: news
description: 新浪财经 7x24 小时实时快讯
domain: app.cj.sina.com.cn
strategy: public
browser: false

args:
  limit:
    type: int
    default: 20
    description: Max results (max 50)
  type:
    type: int
    default: 0
    description: "News type: 0=全部 1=A股 2=宏观 3=公司 4=数据 5=市场 6=国际 7=观点 8=央行 9=其它"

pipeline:
  - evaluate: |
      (async () => {
        const limit = Math.max(1, Math.min(${{ args.limit }} || 20, 50));
        const typeMap = [0, 10, 1, 3, 4, 5, 102, 6, 6, 8];
        const apiTag = typeMap[${{ args.type }}] ?? 0;
        const params = new URLSearchParams({
          page: '1', size: String(limit), tag: String(apiTag)
        });
        const resp = await fetch('https://app.cj.sina.com.cn/api/news/pc?' + params);
        if (!resp.ok) throw new Error('Sina Finance API HTTP ' + resp.status);
        const json = await resp.json();
        const list = json?.result?.data?.feed?.list || [];
        if (!list.length) throw new Error('No news found');
        const stripHtml = (html) => (html || '').replace(/<[^>]+>/g, '').trim();
        return list.map(item => ({
          id: item.id || '',
          time: item.create_time || '',
          content: stripHtml(item.rich_text || ''),
          views: item.view_num || 0,
        }));
      })()

columns: [id, time, content, views]
